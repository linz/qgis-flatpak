name: Build and Push Flatpak

on:
  push:
    branches:
      - master

permissions:
  contents: write # Required to push the built repo back to the branch
  packages: write # Required to push Docker images to GHCR

jobs:
  flatpak-build:
    runs-on: ubuntu-latest_64core
    outputs:
      build_id: ${{ steps.bundle_info.outputs.build_id }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix Git Trust
        run: git config --global --add safe.directory '/__w/qgis-flatpak/*'

      - name: Cache Flatpak downloads
        uses: actions/cache/restore@v4
        id: cache-downloads
        with:
          path: .flatpak-builder/downloads
          key: flatpak-downloads-${{ hashFiles('nz.govt.linz.qgis.json', 'modules/*.json', 'shared-modules/*.json') }}
          restore-keys: |
            flatpak-downloads-

      - name: Cache Flatpak ccache
        uses: actions/cache@v4
        with:
          path: .flatpak-builder/ccache
          key: flatpak-ccache-${{ hashFiles('nz.govt.linz.qgis.json', 'modules/*.json', 'shared-modules/*.json') }}
          restore-keys: |
            flatpak-ccache-

      - name: Bundle info
        run: |
          QGIS_COMMIT=$(jq -r '.modules[] | select(objects | .name == "qgis") | .sources[0].commit' nz.govt.linz.qgis.json)
          SHORT_QGIS=${QGIS_COMMIT:0:6}
          CURRENT_COMMIT=$(git rev-parse --short=6 HEAD)
          BUILD_ID=${{github.run_number}}
          ID="linz-qgis_${SHORT_QGIS}-${CURRENT_COMMIT}_build-${BUILD_ID}"
          echo "build_id=${ID}" >> $GITHUB_OUTPUT
        id: bundle_info

      - name: Setup Flathub Remote
        run: |
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install Build Dependencies
        run: |
          rm -rf build-dir
          dbus-run-session flatpak-builder --force-clean --disable-rofiles-fuse --user --install-deps-from=flathub --install-deps-only --state-dir=.flatpak-builder build-dir nz.govt.linz.qgis.json

      - name: Download Sources
        run: |
           dbus-run-session flatpak-builder --force-clean --download-only --state-dir=.flatpak-builder build-dir nz.govt.linz.qgis.json

      - name: Save Flatpak downloads (on success or failure)
        if: always() && steps.cache-downloads.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .flatpak-builder/downloads
          key: ${{ steps.cache-downloads.outputs.cache-primary-key }}

      - name: Build Group 1 - Foundation Libraries
        run: |
           dbus-run-session flatpak-builder --force-clean --disable-rofiles-fuse --user --stop-at=spatialite --state-dir=.flatpak-builder build-dir nz.govt.linz.qgis.json --disable-download

      - name: Build Group 2 - Database & Storage
        run: |
           dbus-run-session flatpak-builder --force-clean --disable-rofiles-fuse --user --stop-at=gdal --state-dir=.flatpak-builder build-dir nz.govt.linz.qgis.json --disable-download

      - name: Build Group 3 - Qt Libraries
        run: |
           dbus-run-session flatpak-builder --force-clean --disable-rofiles-fuse --user --stop-at=qscintilla --state-dir=.flatpak-builder build-dir nz.govt.linz.qgis.json --disable-download

      - name: Build Group 4 - Python Core
        run: |
           dbus-run-session flatpak-builder --force-clean --disable-rofiles-fuse --user --stop-at=python-setuptools --state-dir=.flatpak-builder build-dir nz.govt.linz.qgis.json --disable-download

      - name: Build Group 5 - Python Geospatial
        run: |
           dbus-run-session flatpak-builder --force-clean --disable-rofiles-fuse --user --stop-at=python-psycopg2 --state-dir=.flatpak-builder build-dir nz.govt.linz.qgis.json --disable-download

      - name: Build Group 7 - Python Templates & Additional
        run: |
           dbus-run-session flatpak-builder --force-clean --disable-rofiles-fuse --user --stop-at=Draco --state-dir=.flatpak-builder build-dir nz.govt.linz.qgis.json --disable-download

      - name: Build Group 8 - QGIS Main
        run: |
           dbus-run-session flatpak-builder --force-clean --disable-rofiles-fuse --user --stop-at=env-python --state-dir=.flatpak-builder build-dir nz.govt.linz.qgis.json --disable-download

      - name: Finalize Build
        run: |
           dbus-run-session flatpak-builder --disable-rofiles-fuse --user --repo=repo --finish-only --state-dir=.flatpak-builder build-dir nz.govt.linz.qgis.json --disable-download

      - name: Create Bundle
        run: |
          flatpak build-bundle repo ${BUILD_NAME}.flatpak nz.govt.linz.qgis
        env:
          BUILD_NAME: ${{ steps.bundle_info.outputs.build_id }}

      - name: Archive build files
        run: |
          RUNTIME_PATH=$(flatpak info -l org.kde.Platform//6.9 --user)
          mkdir -p combined_files
          rsync -a $RUNTIME_PATH/files/ combined_files/
          chmod -R u+w combined_files
          rsync -a build-dir/files/ combined_files/
          # Remove heavy/unnecessary directories before archiving
          rm -rf combined_files/lib/debug
          rm -rf combined_files/include
          rm -rf combined_files/lib/pkgconfig
          rm -rf combined_files/share/doc
          rm -rf combined_files/share/man
          find combined_files/lib -name "*.a" -delete
          find combined_files/lib -name "*.la" -delete
          tar -czf build-files.tar.gz -C combined_files .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.bundle_info.outputs.build_id }}
          path: |
            ${{ steps.bundle_info.outputs.build_id }}.flatpak
            build-files.tar.gz

  docker-build:
    needs: flatpak-build
    runs-on: ubuntu-latest_64core
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.flatpak-build.outputs.build_id }}
          path: .

      - name: Extract build files
        run: |
          mkdir -p build-dir/files
          tar -xzf build-files.tar.gz -C build-dir/files

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ needs.flatpak-build.outputs.build_id }}

      - name: Generate Release Tag
        id: tag
        run: |
          echo "release_tag=$(date +'%Y-%m-%d')-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.tag.outputs.release_tag }} \
            --title "Release ${{ steps.tag.outputs.release_tag }}" \
            --generate-notes \
            ${{ needs.flatpak-build.outputs.build_id }}.flatpak
